<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Armed & Anchored — Spiritual Warfare Training Journal</title>
    <link rel="apple-touch-icon" href="/icon.png"/>
    <link rel="icon" type="image/png" href="/icon.png"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Armed & Anchored"/>
    <meta name="theme-color" content="#070E17"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
    <style>
      @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .35s ease both}
      @keyframes fi{from{opacity:0}to{opacity:1}}.fi{animation:fi .25s ease both}
      @keyframes sd{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}.sd{animation:sd .28s ease both}
      *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
      body{background:#070E17;margin:0;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
      button{transition:all .2s ease;cursor:pointer}
      button:hover{filter:brightness(1.1);transform:translateY(-1px)}
      button:active{transform:scale(0.97) translateY(0)!important}
      textarea:focus,input:focus{border-color:rgba(176,138,78,0.45)!important;box-shadow:0 0 0 3px rgba(176,138,78,0.08)!important;outline:none!important}
      ::-webkit-scrollbar{width:4px}
      ::-webkit-scrollbar-thumb{background:rgba(158,40,40,0.3);border-radius:3px}
      textarea,input{resize:vertical;font-family:"EB Garamond",Georgia,serif;font-size:16px!important}
      html,body,#root{height:100%;min-height:100vh}
    </style>
    <meta name="description" content="Spiritual Warfare Training Journal — Armed & Anchored by Elora Radiance Co."/>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
